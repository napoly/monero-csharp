services:

  tests:
    build:
      context: ..
      dockerfile: Monero.IntegrationTests/Dockerfile
    environment:
      XMR_DAEMON_URI: http://node_2:28081
      XMR_WALLET_1_URI: http://xmr_wallet_1:18082
      XMR_WALLET_2_URI: http://xmr_wallet_2:18083
      TESTS_INCONTAINER: "true"
    depends_on:
      - xmr_wallet_1
      - xmr_wallet_2
    extra_hosts:
      - "tests:127.0.0.1"
    volumes:
      - ../coverage:/coverage

  # The dev container is not used, it is just handy to run `docker-compose up dev` to start all services
  dev:
    image: alpine:3.23.3
    container_name: dev
    command: [ "/bin/sh", "-c", "trap : TERM INT; while :; do echo Ready to code and debug like a rockstar!!!; sleep 2073600; done & wait" ]
    depends_on:
      - node_2
      - xmr_wallet_1
      - xmr_wallet_2

  node_1:
    image: btcpayserver/monero:0.18.4.3
    container_name: node_1
    command: [
      "monerod",
      "--fixed-difficulty=150",
      "--p2p-bind-ip=0.0.0.0",
      "--p2p-bind-port=18080",
      "--rpc-bind-port=18081",
      "--rpc-bind-ip=0.0.0.0",
      "--confirm-external-bind",
      "--rpc-access-control-origins=*",
      "--testnet",
      "--add-exclusive-node=node_2:28080",
      "--no-igd",
      "--hide-my-port",
      "--no-zmq",
      "--disable-rpc-ban",
      "--rpc-max-connections=1000",
      "--max-connections-per-ip=10",
      "--rpc-max-connections-per-private-ip=1000",
      "--start-mining=9xSyMy1r9h3BVjMrF3CTqQCQy36yCfkpn7uVfMyTUbez3hhumqBUqGUNNALjcd7f1HJBRdeH82bCC3veFHW7z3xm28gug4d",
      "--mining-threads=1",
      "--non-interactive"
    ]
    volumes:
      - xmr_node_1_data:/data
    ports:
      - "18080:18080"
      - "18081:18081"

  node_2:
    image: btcpayserver/monero:0.18.4.3
    container_name: node_2
    command: [
      "monerod",
      "--fixed-difficulty=150",
      "--p2p-bind-ip=0.0.0.0",
      "--p2p-bind-port=28080",
      "--rpc-bind-port=28081",
      "--rpc-bind-ip=0.0.0.0",
      "--confirm-external-bind",
      "--rpc-access-control-origins=*",
      "--testnet",
      "--add-exclusive-node=node_1:18080",
      "--no-igd",
      "--hide-my-port",
      "--no-zmq",
      "--disable-rpc-ban",
      "--rpc-max-connections=1000",
      "--max-connections-per-ip=10",
      "--rpc-max-connections-per-private-ip=1000",
      "--non-interactive"
    ]
    volumes:
      - xmr_node_2_data:/data
    ports:
      - "28080:28080"
      - "28081:28081"
    depends_on:
      - node_1

  xmr_wallet_1:
    image: btcpayserver/monero:0.18.4.3
    container_name: xmr_wallet_1
    command: [
      "monero-wallet-rpc",
      "--log-level=2",
      "--rpc-bind-ip=0.0.0.0",
      "--testnet",
      "--disable-rpc-login",
      "--confirm-external-bind",
      "--rpc-bind-port=18082",
      "--daemon-address=node_2:28081",
      "--wallet-dir=/wallet",
      "--rpc-access-control-origins=*"
    ]
    ports:
      - "18082:18082"
    volumes:
      - xmr_wallet_1_data:/wallet
    depends_on:
      - node_1
      - node_2

  xmr_wallet_2:
    image: btcpayserver/monero:0.18.4.3
    container_name: xmr_wallet_2
    command: [
      "monero-wallet-rpc",
      "--log-level=2",
      "--rpc-bind-ip=0.0.0.0",
      "--testnet",
      "--disable-rpc-login",
      "--confirm-external-bind",
      "--rpc-bind-port=18083",
      "--non-interactive",
      "--trusted-daemon",
      "--daemon-address=node_2:28081",
      "--wallet-dir=/wallet",
      "--rpc-access-control-origins=*"
    ]
    ports:
      - "18083:18083"
    volumes:
      - xmr_wallet_2_data:/wallet
    depends_on:
      - node_1
      - node_2

volumes:
  xmr_node_1_data:
  xmr_node_2_data:
  xmr_wallet_1_data:
  xmr_wallet_2_data: